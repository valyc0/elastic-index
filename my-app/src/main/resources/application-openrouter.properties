spring.config.import=optional:file:.env[.properties]

embedding.provider=ollama
llm.provider=openrouter

ollama.url=http://localhost:11434
ollama.embed.model=nomic-embed-text
ollama.embed.dimensions=768

openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.chat.model=nvidia/nemotron-3-nano-30b-a3b:free
openrouter.chat.max-tokens=1024
openrouter.site.url=http://localhost:8080
openrouter.site.name=my-app
