spring.application.name=my-app
spring.elasticsearch.uris=http://localhost:9200

# ────────────────────────────────────────────────────
# PROFILO ATTIVO
# Seleziona la configurazione di provider da caricare.
# Valori: ollama | openai | openrouter
# Sovrascrivibile anche con: --spring.profiles.active=openrouter
# ────────────────────────────────────────────────────
spring.profiles.active=openrouter

# ────────────────────────────────────────────────────
# DOCLING SERVICE (microservizio Python)
# ────────────────────────────────────────────────────
docling.url=http://localhost:8001
# Timeout richiesta HTTP verso Docling in secondi.
# PDF grandi su CPU possono richiedere 5-10 minuti. Aumentare se necessario.
docling.timeout-seconds=900

# ────────────────────────────────────────────────────
# CHUNKING
# ────────────────────────────────────────────────────
chunking.max-words=400
chunking.overlap-sentences=2
chunking.min-words=30

# ────────────────────────────────────────────────────
# EMBEDDING BATCH
# Numero di chunk per sotto-batch nella generazione embedding.
# Valori più alti = meno round-trip HTTP ma più RAM richiesta.
# ────────────────────────────────────────────────────
ollama.embed.batch-size=184

# ────────────────────────────────────────────────────
# ELASTICSEARCH INDEX
# ────────────────────────────────────────────────────
semantic.index.name=semantic_docs

# ────────────────────────────────────────────────────
# HYBRID SEARCH (BM25 + kNN RRF)
# ────────────────────────────────────────────────────
hybrid.search.bm25-weight=1.0
hybrid.search.vector-weight=1.0
# Boost posizionale per query sul finale narrativo (fine/muore/conclusione/...).
# Valori: 0.0 = disabilitato, 0.5 = moderato, 1.0 = forte
hybrid.search.position-weight=2.0
# Second-stage reranking sopra i candidati RRF.
hybrid.search.rerank.enabled=true
# Numero massimo di candidati RRF da riesaminare nel secondo stadio.
hybrid.search.rerank.window=40
# Pesi del reranker leggero: score RRF normalizzato + overlap query/contenuto + match su titolo/file.
hybrid.search.rerank.rrf-weight=0.65
hybrid.search.rerank.term-overlap-weight=0.25
hybrid.search.rerank.title-match-weight=0.10

# ────────────────────────────────────────────────────
# RAG PIPELINE
# ────────────────────────────────────────────────────
rag.context.max-tokens=6000
rag.context.top-k=15
rag.grounding.min-score=0.15
rag.grounding.min-sources=2
rag.grounding.require-citations=true
rag.grounding.auto-append-citations=true
rag.grounding.auto-append.max-sources=2
# Numero di domande di chiarimento/approfondimento generate dall'AI.
# L'LLM decide autonomamente (CASO A o CASO B) se rispondere o chiedere chiarimenti.
rag.followup.questions-count=3
# Numero massimo di turni (coppie user+assistant) mantenuti per sessione (sliding window).
rag.conversation.max-turns=10
# Minuti di inattività dopo i quali una sessione viene eliminata automaticamente.
rag.conversation.ttl-minutes=60

# ────────────────────────────────────────────────────
# H2 DATABASE (stato documenti parsati)
# File persistente: ./data/docling-store.mv.db
# ────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/docling-store;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ────────────────────────────────────────────────────
# UPLOAD
# ────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ────────────────────────────────────────────────────
# LOGGING
# ────────────────────────────────────────────────────
logging.level.io.bootify.my_app=DEBUG
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
