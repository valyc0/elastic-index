spring.application.name=my-app
spring.elasticsearch.uris=http://localhost:9200

# ────────────────────────────────────────────────────
# PROFILO ATTIVO
# Seleziona la configurazione di provider da caricare.
# Valori: ollama | openai | openrouter
# Sovrascrivibile anche con: --spring.profiles.active=openrouter
# ────────────────────────────────────────────────────
spring.profiles.active=ollama

# ────────────────────────────────────────────────────
# DOCLING SERVICE (microservizio Python)
# ────────────────────────────────────────────────────
docling.url=http://localhost:8001

# ────────────────────────────────────────────────────
# CHUNKING
# ────────────────────────────────────────────────────
chunking.max-words=400
chunking.overlap-sentences=2
chunking.min-words=30

# ────────────────────────────────────────────────────
# ELASTICSEARCH INDEX
# ────────────────────────────────────────────────────
semantic.index.name=semantic_docs

# ────────────────────────────────────────────────────
# HYBRID SEARCH (BM25 + kNN RRF)
# ────────────────────────────────────────────────────
hybrid.search.bm25-weight=1.0
hybrid.search.vector-weight=1.0

# ────────────────────────────────────────────────────
# RAG PIPELINE
# ────────────────────────────────────────────────────
rag.context.max-tokens=3000
rag.context.top-k=5

# ────────────────────────────────────────────────────
# LOGGING
# ────────────────────────────────────────────────────
logging.level.io.bootify.my_app=DEBUG
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
