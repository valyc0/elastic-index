spring.application.name=my-app
spring.elasticsearch.uris=http://localhost:9200

# ────────────────────────────────────────────────────
# EMBEDDING PROVIDER
# Valori: ollama (default) | openai
# ────────────────────────────────────────────────────
embedding.provider=ollama

# Ollama - embedding locale free (nomic-embed-text, 768 dims, Apache-2.0)
ollama.url=http://localhost:11434
ollama.embed.model=nomic-embed-text
ollama.embed.dimensions=768

# OpenAI embedding (attivo solo se embedding.provider=openai)
# openai.api.key=sk-...
# openai.embed.model=text-embedding-3-small
# openai.embed.dimensions=1536

# ────────────────────────────────────────────────────
# LLM PROVIDER
# Valori: ollama (default) | openai
# ────────────────────────────────────────────────────
llm.provider=ollama

# Ollama - LLM locale per generazione risposta RAG
ollama.chat.model=qwen2.5:1.5b

# OpenAI LLM (attivo solo se llm.provider=openai)
# openai.chat.model=gpt-4o-mini
# openai.chat.max-tokens=1024

# ────────────────────────────────────────────────────
# DOCLING SERVICE (microservizio Python)
# ────────────────────────────────────────────────────
docling.url=http://localhost:8001


chunking.max-words=400
chunking.overlap-sentences=2
chunking.min-words=30

# ────────────────────────────────────────────────────
# ELASTICSEARCH INDEX
# ────────────────────────────────────────────────────
semantic.index.name=semantic_docs

# ────────────────────────────────────────────────────
# HYBRID SEARCH (BM25 + kNN RRF)
# ────────────────────────────────────────────────────
hybrid.search.bm25-weight=1.0
hybrid.search.vector-weight=1.0

# ────────────────────────────────────────────────────
# RAG PIPELINE
# ────────────────────────────────────────────────────
# Numero massimo di parole nel contesto inviato all'LLM
rag.context.max-tokens=3000
# Top-K chunk di default per il retrieval
rag.context.top-k=5

# ────────────────────────────────────────────────────
# LOGGING
# ────────────────────────────────────────────────────
logging.level.io.bootify.my_app=DEBUG
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
